name: Java CI Checkstyle, JaCoCo, Build

on:
  push:
    branches:
      - master
      - 'feature/**'
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout clone repo
        uses: actions/checkout@v4

      - name: Gradle Wrapper chmod
        run: chmod +x gradlew

      - name: JDK 25 Temurin
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Checkstyle run
        run: ./gradlew --no-daemon checkstyleMain

      - name: Tests run
        run: ./gradlew --no-daemon test

      - name: JaCoCo report
        run: ./gradlew --no-daemon jacocoTestReport

      - name: JaCoCo test coverage verification
        run: ./gradlew --no-daemon jacocoTestCoverageVerification

      - name: Build project
        run: ./gradlew --no-daemon build
